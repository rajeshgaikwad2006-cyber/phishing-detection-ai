<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5 text-center" style="max-width:400px;">

    <h3>📝 Register</h3>

    <form method="POST">
        <input class="form-control mt-3" name="username" placeholder="Username" required>
        <input class="form-control mt-3" type="password" name="password" placeholder="Password" required>

        <button class="btn btn-success mt-3 w-100">Register</button>
    </form>

    {% if msg %}
        <p class="mt-3 text-info">{{ msg }}</p>
    {% endif %}

    <a href="/login">Already have account? Login</a>

</div>

</body>
</html>
